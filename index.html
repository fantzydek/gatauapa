<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundboard Kamera Tangan</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #111; color: white; font-family: sans-serif; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 100vh; }
        #videoElement {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.8; /* Sedikit gelap biar teks jelas */
        }
        
        .hud {
            position: absolute; z-index: 20;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px 30px;
        }

        .status-box {
            top: 30px; left: 30px;
        }

        .gesture-text {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px currentColor;
            transition: color 0.2s;
        }

        .guide-box {
            bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px;
        }

        .guide-item {
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
        }

        .guide-icon {
            font-size: 30px;
            margin-bottom: 5px;
        }

        .flash-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 15;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .loading-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 0.5s;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loadingScreen" class="loading-screen">
            <h2>Memuat Model...</h2>
            <p style="color: #00f3ff; margin-top: 10px;">Memindai deteksi tangan...</p>
        </div>

        <div id="flashOverlay" class="flash-overlay"></div>
        <video id="videoElement" autoplay playsinline></video>

        <div class="hud status-box">
            <div style="font-size: 12px; letter-spacing: 2px; color: #aaa; margin-bottom: 5px;">GESTURE</div>
            <div id="gestureText" class="gesture-text" style="color: #aaa;">MENUNGGU...</div>
        </div>

        <div class="hud guide-box">
            <div class="guide-item"><div class="guide-icon">✊</div>Genggam</div>
            <div class="guide-item"><div class="guide-icon">✋</div>Buka</div>
            <div class="guide-item"><div class="guide-icon">👍</div>Jempol</div>
            <div class="guide-item"><div class="guide-icon">☝️</div>Telunjuk</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const gestureText = document.getElementById('gestureText');
        const flashOverlay = document.getElementById('flashOverlay');
        const loadingScreen = document.getElementById('loadingScreen');

        // ==========================================
        // PENGATURAN SUARA (GANTI DENGAN FILE ANDA)
        // ==========================================
        const SOUNDS = {
            FIST: 'https://a.top4top.io/m_3788mwmf21.mp3',     // Ganti dengan link/file suara untuk ✊
            OPEN: 'https://f.top4top.io/m_3788aawko1.mp3',        // Ganti dengan link/file suara untuk ✋
            THUMBS_UP: 'https://c.top4top.io/m_3788rr3tm1.mp3', // Ganti dengan link/file suara untuk 👍
            POINT_UP: 'https://f.top4top.io/m_3788okwmq1.mp3' // Ganti dengan link/file suara untuk ☝️
        };

        // Audio Pool System (Anti pecah suara saat di-spam tanpa cooldown)
        class SoundPool {
            constructor(src, poolSize = 5) {
                this.pool = [];
                this.index = 0;
                for (let i = 0; i < poolSize; i++) {
                    const audio = new Audio(src);
                    audio.preload = 'auto';
                    this.pool.push(audio);
                }
            }

            play() {
                // Ambil audio selanjutnya secara berurutan biar nggak tumpang tindih di object yang sama
                const audio = this.pool[this.index];
                audio.currentTime = 0; // Rewind
                audio.play().catch(e => console.log("Menunggu interaksi user..."));
                this.index = (this.index + 1) % this.pool.length;
            }
        }

        // Inisialisasi Pool Suara
        const soundFist = new SoundPool(SOUNDS.FIST);
        const soundOpen = new SoundPool(SOUNDS.OPEN);
        const soundThumbsUp = new SoundPool(SOUNDS.THUMBS_UP);
        const soundPointUp = new SoundPool(SOUNDS.POINT_UP);

        let lastGesture = "NONE";
        let frameCount = 0;

        // Inisialisasi MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.6
        });

        hands.onResults(onResults);

        function onResults(results) {
            if (!loadingScreen.classList.contains('hidden')) {
                loadingScreen.classList.add('hidden');
            }

            frameCount++;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                const gesture = detectGesture(landmarks);

                // Update UI Text
                if (gesture !== lastGesture) {
                    updateUI(gesture);
                    lastGesture = gesture;
                }

                // TANPA COOLDOWN: Mainkan suara setiap beberapa frame (sekitar 10x per detik)
                // Kalau mau super cepat (60x per detik), hapus kondisi (frameCount % 6 === 0)
                if (frameCount % 6 === 0) { 
                    triggerSound(gesture);
                }

            } else {
                if (lastGesture !== "NONE") {
                    gestureText.innerText = "MENUNGGU...";
                    gestureText.style.color = "#aaa";
                    lastGesture = "NONE";
                }
            }
        }

        function triggerSound(gesture) {
            switch(gesture) {
                case "FIST": soundFist.play(); break;
                case "OPEN": soundOpen.play(); break;
                case "THUMBS_UP": soundThumbsUp.play(); break;
                case "POINT_UP": soundPointUp.play(); break;
            }
        }

        function updateUI(gesture) {
            // Flash effect layar saat berganti gestur
            flashOverlay.style.opacity = '0.3';
            setTimeout(() => flashOverlay.style.opacity = '0', 100);

            switch(gesture) {
                case "FIST":
                    gestureText.innerText = "✊ GENGGAM";
                    gestureText.style.color = "#ff4444";
                    break;
                case "OPEN":
                    gestureText.innerText = "✋ TERBUKA";
                    gestureText.style.color = "#44ff44";
                    break;
                case "THUMBS_UP":
                    gestureText.innerText = "👍 JEMPOL";
                    gestureText.style.color = "#ffaa00";
                    break;
                case "POINT_UP":
                    gestureText.innerText = "☝️ TELUNJUK";
                    gestureText.style.color = "#44aaff";
                    break;
            }
        }

        // Logika Deteksi Gestur Jari
        function detectGesture(lm) {
            // Cek apakah jari terbuka (y posisi ujung jari < y posisi buku jari tengah)
            // Kecuali ibu jari (cek sumbu X tergantung tangan kiri/kanan, disederhanakan)
            const isIndexOpen = lm[8].y < lm[6].y;
            const isMiddleOpen = lm[12].y < lm[10].y;
            const isRingOpen = lm[16].y < lm[14].y;
            const isPinkyOpen = lm[20].y < lm[18].y;
            
            const isThumbOpen = Math.abs(lm[4].x - lm[3].x) > 0.05; // Jarak ibu jari ke telapak

            const fingersOpenCount = [isIndexOpen, isMiddleOpen, isRingOpen, isPinkyOpen].filter(Boolean).length;

            // ☝️ TELUNJUK: Hanya telunjuk yang terbuka
            if (isIndexOpen && !isMiddleOpen && !isRingOpen && !isPinkyOpen) {
                return "POINT_UP";
            }

            // 👍 JEMPOL: Hanya ibu jari yang terbuka, yang lain menggenggam
            if (isThumbOpen && fingersOpenCount === 0) {
                return "THUMBS_UP";
            }

            // ✋ TERBUKA: Semua jari terbuka
            if (fingersOpenCount >= 3 && isThumbOpen) {
                return "OPEN";
            }

            // ✊ GENGGAM: Semua jari tertutup
            if (fingersOpenCount === 0 && !isThumbOpen) {
                return "FIST";
            }

            return "NONE";
        }

        // Start Camera
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        
        camera.start().catch(err => {
            console.error(err);
            loadingScreen.innerHTML = `<h2 style="color:red;">Gagal Akses Kamera</h2><p>Izinkan kamera di browser Anda.</p>`;
        });

    </script>
</body>
</html>
